# ══════════════════════════════════════════════════════════════════════════════
# UniVerse GraphQL Schema
# Auth: Cognito User Pools (default, no directive needed)
# ══════════════════════════════════════════════════════════════════════════════

# ── Base Types ────────────────────────────────────────────────────────────────

type User {
  id: ID!
  username: String!
  email: String
}

# ── Friends ───────────────────────────────────────────────────────────────────

enum FriendRequestStatus {
  PENDING
  ACCEPTED
  DECLINED
}

type FriendRequest {
  senderId: ID!
  recipientId: ID!
  status: FriendRequestStatus!
  createdAt: String!
}

# ── Messaging ─────────────────────────────────────────────────────────────────

enum MessageType {
  TEXT
  IMAGE
  GIF
  FILE
}

type Message {
  chatId: ID!
  messageId: ID!
  senderId: ID!
  recipientId: ID!
  type: MessageType!
  content: String!
  attachments: [String]
  translations: AWSJSON
  createdAt: String!
}

type MessageConnection {
  messages: [Message!]!
  nextToken: String
}

type Chat {
  chatId: ID!
  chatType: String!
  participantId: ID!
  lastMessage: String
  lastMessageAt: String
  lastReadAt: String
  archived: Boolean
}

type UserProfile {
  language: String!
  translationEnabled: Boolean!
}

type TypingIndicator {
  chatId: ID!
  userId: ID!
}

# ── Queries ───────────────────────────────────────────────────────────────────

type Query {
  getUser(id: ID!): User
  getUsers(ids: [ID!]!): [User!]!
  searchUsers(query: String!): [User!]!
  getFriends: [FriendRequest!]!
  getPendingRequests: [FriendRequest!]!
  getSentRequests: [FriendRequest!]!
  getMessages(chatId: ID!, nextToken: String): MessageConnection!
  getChats: [Chat!]!
  getUserProfile: UserProfile!
}

# ── Mutations ─────────────────────────────────────────────────────────────────

type Mutation {
  sendFriendRequest(recipientId: ID!): FriendRequest!
  respondToFriendRequest(senderId: ID!, accept: Boolean!): FriendRequest!
  cancelFriendRequest(recipientId: ID!): Boolean!
  removeFriend(friendId: ID!): FriendRequest!
  sendMessage(chatId: ID!, content: String!, type: MessageType!, attachments: [String]): Message!
  createChat(participantId: ID!): Chat!
  markChatRead(chatId: ID!): Boolean!
  getUploadUrl(chatId: ID!, fileName: String!): String!
  setUserProfile(language: String!, translationEnabled: Boolean!): UserProfile!
  translateMessage(chatId: ID!, messageId: ID!, timestamp: String!): Message!
  sendTypingIndicator(chatId: ID!): TypingIndicator!
}

# ── Subscriptions ─────────────────────────────────────────────────────────────

type Subscription {
  onFriendRequestReceived(recipientId: ID!): FriendRequest
    @aws_subscribe(mutations: ["sendFriendRequest"])

  onFriendRequestUpdated: FriendRequest
    @aws_subscribe(mutations: ["respondToFriendRequest"])

  onFriendListUpdated: FriendRequest
    @aws_subscribe(mutations: ["respondToFriendRequest", "removeFriend"])

  onMessageReceived(recipientId: ID!): Message
    @aws_subscribe(mutations: ["sendMessage"])

  onTypingIndicator(chatId: ID!): TypingIndicator
    @aws_subscribe(mutations: ["sendTypingIndicator"])
}
